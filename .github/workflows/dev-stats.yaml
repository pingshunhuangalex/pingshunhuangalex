name: Generate Dev Stats Cards

on:
    schedule:
        - cron: '0 20 * * *'
    workflow_dispatch:

jobs:
    build-and-update:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  token: ${{ secrets.SPHS_BOT_TOKEN }}
                  fetch-depth: 0

            - name: Generate GitHub stats card
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: stats
                  options: username=${{ github.repository_owner }}&hide_title=true&hide_border=true&show_icons=true&rank_icon=github&include_all_commits=true&count_private=true&line_height=22&theme=nightowl
                  path: assets/stats.svg
                  token: ${{ secrets.DEV_STATS_TOKEN }}

            - name: Generate GitHub top languages card
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: top-langs
                  options: username=${{ github.repository_owner }}&hide=html&hide_title=true&hide_border=true&layout=compact&langs_count=8&theme=nightowl
                  path: assets/top-langs.svg
                  token: ${{ secrets.DEV_STATS_TOKEN }}

            - name: Update cards
              env:
                  GITHUB_TOKEN: ${{ secrets.SPHS_BOT_TOKEN }}
              run: |
                  # Dev stats cards generation via bot
                  BOT_EMAIL="107382682+sphs-bot@users.noreply.github.com"

                  git config user.name "SPHS [Bot]"
                  git config user.email "$BOT_EMAIL"

                  git add assets/*.svg

                  if git diff --cached --quiet; then
                      echo "🟡 No profile changes were found."
                      echo "🟢 The existing dev stats cards are still valid. No changes were made."
                      exit 0
                  fi

                  # Get the email of the last commit author
                  LAST_COMMIT_EMAIL=$(git log -1 --format='%ae')

                  if [ "$LAST_COMMIT_EMAIL" = "$BOT_EMAIL" ]; then
                      echo "🟣 Last commit was pushed by the dev cards generation bot. Amending..."

                      git commit --amend --no-edit
                      git push --force-with-lease
                  else
                      echo "🟣 Last commit was pushed by a user. Creating a new commit..."

                      git commit -m "Update dev stats cards" || exit 0
                      git push
                  fi

                  echo "🟢 All dev stats cards updated and are now live!"
