name: Generate Dev Stats Cards

on:
    schedule:
        - cron: '0 20 * * *'
    workflow_dispatch:

jobs:
    build-and-update:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Generate bot token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ vars.SPHS_ACTIONS_CLIENT_ID }}
                  private-key: ${{ secrets.SPHS_ACTIONS_PRIVATE_KEY }}

            - name: Get bot ID
              id: get-user-id
              run: |
                  # Fetch bot identity via token
                  BOT_USER_ID=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq '.id')

                  echo "bot-id=${BOT_USER_ID}" >> "$GITHUB_OUTPUT"
                  echo "🟢 Bot ID ${BOT_USER_ID} is identified!"
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  fetch-depth: 0

            - name: Configure Git for bot
              run: |
                  # Set up Git for bot
                  APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
                  BOT_ID="${{ steps.get-user-id.outputs.bot-id }}"
                  USER_NAME="${APP_SLUG}[bot]"
                  USER_EMAIL="${BOT_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

                  git config --global user.name "${USER_NAME}"
                  git config --global user.email "${USER_EMAIL}"

                  echo "🟢 Bot ${USER_NAME}<${USER_EMAIL}> is ready!"

            - name: Generate GitHub stats card
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: stats
                  options: username=${{ github.repository_owner }}&hide_title=true&hide_border=true&show_icons=true&rank_icon=github&include_all_commits=true&count_private=true&line_height=22&theme=nightowl
                  path: assets/stats.svg
                  token: ${{ steps.app-token.outputs.token }}

            - name: Generate GitHub top languages card
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: top-langs
                  options: username=${{ github.repository_owner }}&hide=html&hide_title=true&hide_border=true&layout=compact&langs_count=8&theme=nightowl
                  path: assets/top-langs.svg
                  token: ${{ steps.app-token.outputs.token }}

            - name: Update cards
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # Dev stats cards generation via bot
                  git add assets/*.svg

                  if git diff --cached --quiet; then
                      echo "🟡 No profile changes were found."
                      echo "🟢 The existing dev stats cards are still valid. No changes were made."
                      exit 0
                  fi

                  # Get the email of the last commit author
                  LAST_COMMIT_EMAIL=$(git log -1 --format='%ae')

                  if [ "$LAST_COMMIT_EMAIL" = "$BOT_EMAIL" ]; then
                      echo "🟣 Last commit was pushed by the dev cards generation bot. Amending..."

                      git commit --amend --no-edit
                      git push --force-with-lease
                  else
                      echo "🟣 Last commit was pushed by a user. Creating a new commit..."

                      git commit -m "Update dev stats cards" || exit 0
                      git push
                  fi

                  echo "🟢 All dev stats cards updated and are now live!"
