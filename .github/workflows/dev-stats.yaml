name: Generate Dev Stats Cards

on:
    schedule:
        - cron: '0 20 * * *'
    workflow_dispatch:

jobs:
    generate-streak-card:
        runs-on: ubuntu-latest
        steps:
            - name: Generate bot token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ vars.SPHS_ACTIONS_CLIENT_ID }}
                  private-key: ${{ secrets.SPHS_ACTIONS_PRIVATE_KEY }}

            - name: Checkout GitHub streak stats source
              uses: actions/checkout@v6
              with:
                  repository: 'DenverCoder1/github-readme-streak-stats'
                  path: 'build'

            - name: Setup PHP environment
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  extensions: mbstring, intl

            - name: Generate GitHub streak card
              run: |
                  # Generate GitHub streak card in the built PHP environment
                  echo "🟣 Installing dependencies..."

                  cd build
                  composer install --no-interaction --prefer-dist > /dev/null 2>&1
                  echo "TOKEN=${{ steps.app-token.outputs.token }}" > .env

                  echo "🟣 Spinning up PHP environment..."

                  php -S localhost:8000 -t src/ > /dev/null 2>&1 &
                  PHP_SERVER_PID=$!

                  sleep 2

                  echo "🟣 Building GitHub streak card..."

                  mkdir -p ../assets
                  curl --retry 3 --retry-delay 2 -s "http://localhost:8000/?user=${{ github.repository_owner }}&hide_border=true&theme=nightowl" -o ../assets/streak.svg

                  echo "🟣 Cleaning up PHP environment..."

                  kill $PHP_SERVER_PID
                  cd ..
                  rm -rf build

                  echo "🟢 GitHub streak card generated!"

            - name: Upload streak artifact
              uses: actions/upload-artifact@v7
              with:
                  name: streak-card
                  path: assets/streak.svg

    generate-stats-card:
        runs-on: ubuntu-latest
        steps:
            - name: Generate bot token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ vars.SPHS_ACTIONS_CLIENT_ID }}
                  private-key: ${{ secrets.SPHS_ACTIONS_PRIVATE_KEY }}

            - name: Generate GitHub stats card
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: stats
                  options: username=${{ github.repository_owner }}&hide_title=true&hide_border=true&show_icons=true&rank_icon=github&include_all_commits=true&count_private=true&line_height=22&theme=nightowl
                  path: assets/stats.svg
                  token: ${{ steps.app-token.outputs.token }}

            - name: Upload stats artifact
              uses: actions/upload-artifact@v7
              with:
                  name: stats-card
                  path: assets/stats.svg

    generate-top-langs-card:
        runs-on: ubuntu-latest
        steps:
            - name: Generate bot token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ vars.SPHS_ACTIONS_CLIENT_ID }}
                  private-key: ${{ secrets.SPHS_ACTIONS_PRIVATE_KEY }}

            - name: Generate GitHub top languages card
              uses: readme-tools/github-readme-stats-action@v1
              with:
                  card: top-langs
                  options: username=${{ github.repository_owner }}&hide=html&hide_title=true&hide_border=true&layout=compact&langs_count=8&theme=nightowl
                  path: assets/top-langs.svg
                  token: ${{ steps.app-token.outputs.token }}

            - name: Upload top languages artifact
              uses: actions/upload-artifact@v7
              with:
                  name: top-langs-card
                  path: assets/top-langs.svg

    update-cards:
        needs:
            [generate-streak-card, generate-stats-card, generate-top-langs-card]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Generate bot token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ vars.SPHS_ACTIONS_CLIENT_ID }}
                  private-key: ${{ secrets.SPHS_ACTIONS_PRIVATE_KEY }}

            - name: Get bot fingerprints
              id: get-bot-fingerprints
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  # Fetch bot identity via token
                  APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
                  BOT_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq '.id')

                  BOT_NAME="${APP_SLUG}[bot]"
                  BOT_EMAIL="${BOT_ID}+${APP_SLUG}[bot]@users.noreply.github.com" # Grab bot info from https://api.github.com/users/sphs-actions[bot]

                  echo "bot-name=${BOT_NAME}" >> "$GITHUB_OUTPUT"
                  echo "bot-email=${BOT_EMAIL}" >> "$GITHUB_OUTPUT"

                  echo "🟢 Bot ${BOT_NAME}<${BOT_EMAIL}> identified!"

            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  fetch-depth: 0

            - name: Download card artifacts
              uses: actions/download-artifact@v8
              with:
                  merge-multiple: true
                  path: assets/

            - name: Check cards
              id: check-cards
              run: |
                  # Check dev stats cards availability
                  BOT_EMAIL="${{ steps.get-bot-fingerprints.outputs.bot-email }}"
                  git add assets/*.svg

                  if git diff --staged --quiet; then
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                      echo "🟡 No profile changes found. The existing dev stats cards are still valid!"
                  else
                      echo "skip=false" >> "$GITHUB_OUTPUT"

                      LAST_EMAIL=$(git log -1 --format='%ae') # Get the email of the last commit author

                      if [ "${LAST_EMAIL}" = "${BOT_EMAIL}" ]; then
                          echo "🟣 Last commit was pushed by the dev cards generation bot. Rolling back remote and creating a new commit..."

                          git reset --soft HEAD~1
                          git push --force-with-lease origin HEAD
                      else
                          echo "🟣 Last commit was pushed by a user. Creating a new commit..."
                      fi
                  fi

            - name: Update cards
              if: steps.check-cards.outputs.skip == 'false'
              uses: iarekylew00t/verified-bot-commit@v2
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  auto-stage: false
                  message: 'Daily scan for dev stats card updates'
                  files: |
                      assets/*.svg
